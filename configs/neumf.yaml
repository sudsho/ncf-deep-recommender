# NeuMF fusion config — slightly bigger than default
data:
  path: data/ml-100k/u.data
  min_user_interactions: 5
  num_negatives_train: 4
  num_negatives_eval: 99
  test_size: 1

model:
  type: neumf
  embed_dim_gmf: 32
  embed_dim_mlp: 64
  mlp_layers: [128, 64, 32, 16]
  dropout: 0.1

train:
  batch_size: 1024
  epochs: 20
  lr: 1.0e-3
  weight_decay: 1.0e-6
  num_workers: 0
  device: cpu
  seed: 42

eval:
  top_k: 10

mlflow:
  enabled: true
  experiment_name: ncf-deep-recommender
  tracking_uri: ./mlruns

artifacts:
  out_dir: artifacts
  model_name: neumf.pt
